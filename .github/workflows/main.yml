name: Bot Trading Pocket Option

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bot
        env:
          POCKET_EMAIL: ${{ secrets.POCKET_EMAIL }}
          POCKET_PASS: ${{ secrets.POCKET_PASS }}
        run: python trading_bot.py
