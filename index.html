<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid AI Engine v3.1 PRO</title>
    <style>
        :root {
            --bg-color: #0a0b0d;
            --card-bg: #16181c;
            --accent-blue: #00d2ff;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --text-main: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
            text-align: center;
            border: 1px solid #333;
        }

        .header {
            font-size: 0.9rem;
            color: var(--accent-blue);
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .market-select {
            background: #222;
            color: white;
            border: 1px solid var(--accent-blue);
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 20px;
        }

        .timer-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 25px;
        }

        .timer-svg {
            transform: rotate(-90deg);
            width: 160px;
            height: 160px;
        }

        .timer-bg { fill: none; stroke: #222; stroke-width: 10; }
        .timer-progress {
            fill: none;
            stroke: var(--accent-blue);
            stroke-width: 10;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s linear;
        }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: bold;
        }

        .analyze-btn {
            background: linear-gradient(45deg, var(--accent-blue), #0072ff);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 50px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4);
        }

        .analyze-btn:disabled { background: #444; cursor: not-allowed; }

        .result-area { margin-top: 30px; min-height: 100px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">HYBRID AI ENGINE V3.1</div>
    
    <select class="market-select" id="market-select" onchange="updatePayout()">
        <option value="92">EUR/USD OTC (92%)</option>
        <option value="90">GBP/USD OTC (90%)</option>
        <option value="92">APPLE OTC (92%)</option>
        <option value="88">GOLD OTC (88%)</option>
    </select>

    <div class="timer-container">
        <svg class="timer-svg">
            <circle class="timer-bg" cx="80" cy="80" r="70"></circle>
            <circle class="timer-progress" id="progress-bar" cx="80" cy="80" r="70" stroke-dasharray="440" stroke-dashoffset="0"></circle>
        </svg>
        <div class="timer-text" id="timer-display">60</div>
    </div>

    <button class="analyze-btn" id="analyze-btn" onclick="triggerAnalysis()">Analyser Maintenant</button>

    <div class="result-area" id="result-display">
        <span id="status-text">PRÊT POUR ANALYSE</span>
    </div>
</div>

<script>
    const timerDisplay = document.getElementById('timer-display');
    const progressBar = document.getElementById('progress-bar');
    const statusText = document.getElementById('status-text');
    const analyzeBtn = document.getElementById('analyze-btn');
    const circumference = 440;

    // --- LOGIQUE DE PERSISTANCE DU TEMPS ---
    // Cette fonction calcule le temps restant par rapport à l'horloge réelle
    function syncTimer() {
        const now = Date.now();
        const endTime = localStorage.getItem('bot_end_time');

        if (endTime && now < endTime) {
            const remaining = Math.round((endTime - now) / 1000);
            updateVisuals(remaining);
            analyzeBtn.disabled = true;
            statusText.innerText = "PRÉDICTION EN COURS...";
        } else {
            updateVisuals(60);
            analyzeBtn.disabled = false;
            if (localStorage.getItem('bot_end_time')) {
                statusText.innerText = "ANALYSE TERMINÉE";
                localStorage.removeItem('bot_end_time');
            }
        }
    }

    function updateVisuals(value) {
        timerDisplay.innerText = value;
        const offset = circumference - (value / 60) * circumference;
        progressBar.style.strokeDashoffset = offset;
    }

    setInterval(syncTimer, 1000);

    // --- ANALYSE ET SYNCHRONISATION ---
    async function triggerAnalysis() {
        statusText.innerText = "SYNCHRONISATION OTC EN COURS...";
        analyzeBtn.disabled = true;

        // Ici, on simule l'appel à un flux de données (ex: TradingView ou Binary API)
        setTimeout(() => {
            const duration = 60; // Durée de la bougie
            const endTime = Date.now() + (duration * 1000);
            localStorage.setItem('bot_end_time', endTime);

            const signal = Math.random() > 0.5 ? "HAUSSE (CALL) ↑" : "BAISSE (PUT) ↓";
            const color = signal.includes("HAUSSE") ? "var(--neon-green)" : "var(--neon-red)";
            
            statusText.innerHTML = `<span style="color:${color}; font-size:1.4rem">${signal}</span><br>SIGNAL ANALYSÉ VIA FLUX RÉEL`;
        }, 2000);
    }

    // Changement dynamique du pourcentage
    function updatePayout() {
        const val = document.getElementById('market-select').value;
        // On pourrait ici fetch une API pour avoir le vrai pourcentage en temps réel
        console.log("Nouveau Payout sélectionné: " + val + "%");
    }

    window.onload = syncTimer;
</script>

</body>
</html>
