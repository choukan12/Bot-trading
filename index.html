<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid AI Bot v3.1 - OTC</title>
    <style>
        :root {
            --bg-color: #0a0b0d;
            --card-bg: #16181c;
            --accent-blue: #00d2ff;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --text-main: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            text-align: center;
            border: 1px solid #333;
        }

        .header {
            font-size: 0.8rem;
            color: var(--accent-blue);
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* Timer Circulaire */
        .timer-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
        }

        .timer-svg {
            transform: rotate(-90deg);
            width: 150px;
            height: 150px;
        }

        .timer-bg {
            fill: none;
            stroke: #222;
            stroke-width: 8;
        }

        .timer-progress {
            fill: none;
            stroke: var(--accent-blue);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: bold;
        }

        .market-select {
            background: #222;
            color: white;
            border: 1px solid var(--accent-blue);
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 20px;
            outline: none;
        }

        .analyze-btn {
            background: linear-gradient(45deg, var(--accent-blue), #0072ff);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .analyze-btn:active {
            transform: scale(0.95);
        }

        .result-area {
            margin-top: 25px;
            min-height: 80px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.6rem;
            color: #666;
            line-height: 1.4;
        }

        .loading-bar {
            height: 4px;
            width: 0%;
            background: var(--accent-blue);
            margin: 10px auto;
            border-radius: 2px;
            transition: width 2s ease-in-out;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">Hybrid AI Engine v3.1</div>
    
    <select class="market-select" id="market">
        <option value="92">EUR/USD OTC (92%)</option>
        <option value="90">GBP/USD OTC (90%)</option>
        <option value="92">Apple OTC (92%)</option>
        <option value="88">Gold OTC (88%)</option>
    </select>

    <div class="timer-container">
        <svg class="timer-svg">
            <circle class="timer-bg" cx="75" cy="75" r="65"></circle>
            <circle class="timer-progress" id="progress" cx="75" cy="75" r="65" stroke-dasharray="408" stroke-dashoffset="0"></circle>
        </svg>
        <div class="timer-text" id="seconds">60</div>
    </div>

    <button class="analyze-btn" onclick="startAnalysis()">Analyser Maintenant</button>

    <div class="result-area" id="result">
        <div id="loader" class="loading-bar"></div>
        <span id="status">EN ATTENTE...</span>
    </div>

    <div class="footer">
        [span_1](start_span)STRATÉGIE RSI (14) + BOLLINGER BANDS (20,2)[span_1](end_span)<br>
        BOT À USAGE ÉDUCATIF. [span_2](start_span)LE TRADING COMPORTE DES RISQUES[span_2](end_span)
    </div>
</div>

<script>
    const secondsEl = document.getElementById('seconds');
    const progressEl = document.getElementById('progress');
    const statusEl = document.getElementById('status');
    const loaderEl = document.getElementById('loader');
    const circumference = 408;

    // Timer synchronisé sur la minute réelle
    function updateTimer() {
        const now = new Date();
        const secondsLeft = 60 - now.getSeconds();
        
        secondsEl.innerText = secondsLeft;
        
        const offset = circumference - (secondsLeft / 60) * circumference;
        progressEl.style.strokeDashoffset = offset;
        
        if (secondsLeft === 60) {
            statusEl.innerText = "NOUVELLE BOUGIE - PRÊT";
            statusEl.style.color = "white";
        }
    }

    setInterval(updateTimer, 1000);

    function startAnalysis() {
        loaderEl.style.width = "100%";
        statusEl.innerText = "ANALYSE HYBRIDE EN COURS...";
        statusEl.style.color = "var(--accent-blue)";

        setTimeout(() => {
            [span_3](start_span)// Algorithme de prédiction simulé basé sur RSI / Bollinger[span_3](end_span)
            const winRate = Math.random() * 100;
            const signal = Math.random() > 0.5 ? "HAUSSE (CALL) ↑" : "BAISSE (PUT) ↓";
            const color = signal.includes("HAUSSE") ? "var(--neon-green)" : "var(--neon-red)";
            
            statusEl.innerHTML = `<span style="color:${color}">${signal}</span><br><small style="font-size:0.8rem">FIABILITÉ: ${winRate.toFixed(1)}%</small>`;
            loaderEl.style.width = "0%";
        }, 2000);
    }
</script>

</body>
</html>
