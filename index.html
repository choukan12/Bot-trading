<script type="module">
    import { startBot } from './engine.js';

    let isRunning = false;

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusText = document.getElementById('statusText');
    const signalsContainer = document.getElementById('signalsContainer');
    const logContainer = document.getElementById('logContainer');

    // Fonction pour afficher un signal sur l'interface (déjà présente)
    window.updateUI = function(symbol, signal) {
        let card = document.getElementById(`signal-${symbol.replace(/[^a-zA-Z0-9]/g, '')}`);
        
        if (!card) {
            card = document.createElement('div');
            card.className = `signal-card ${signal.signal.toLowerCase()}`;
            card.id = `signal-${symbol.replace(/[^a-zA-Z0-9]/g, '')}`;
            signalsContainer.appendChild(card);
        }

        const strengthColor = signal.strength > 70 ? 'strong' : signal.strength > 50 ? 'medium' : 'weak';

        card.innerHTML = `
            <div class="symbol">${symbol}</div>
            <div class="signal ${signal.signal.toLowerCase()}">
                ${signal.signal}
            </div>
            <div class="price">$${parseFloat(signal.price).toFixed(4)}</div>
            <div class="strength ${strengthColor}">
                Force : ${signal.strength}%
            </div>
            <div class="rsi">RSI: ${signal.rsi || 'N/A'}</div>
            <div class="reason">${signal.reason}</div>
            <div class="time">${new Date(signal.timestamp).toLocaleTimeString()}</div>
        `;

        // Ajouter au journal
        const logEntry = document.createElement('div');
        logEntry.className = 'log-entry';
        logEntry.innerHTML = `
            <span class="time">[${new Date().toLocaleTimeString()}]</span>
            <span class="symbol">${symbol}</span> → 
            <span class="signal ${signal.signal.toLowerCase()}">${signal.signal}</span> 
            (Force: ${signal.strength}%) - ${signal.reason}
        `;
        logContainer.appendChild(logEntry);
        
        // Garder seulement les 50 derniers logs
        if (logContainer.children.length > 50) {
            logContainer.removeChild(logContainer.children[0]);
        }

        // Scroll automatique vers le bas du journal
        logContainer.scrollTop = logContainer.scrollHeight;
    };

    // Démarrer le bot avec mise à jour du statut pour 1 minute
    startBtn.addEventListener('click', () => {
        if (!isRunning) {
            startBot();
            isRunning = true;
            startBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';
            
            // Mise à jour du statut pour mode 1 minute
            statusText.textContent = 'Statut : Connexion aux marchés • Signaux 1 minute en cours...';
            statusText.style.color = '#4ade80';
        }
    });

    // Arrêter le bot
    stopBtn.addEventListener('click', () => {
        if (confirm('Arrêter le bot et recharger la page ?')) {
            location.reload();
        }
    });
</script>
