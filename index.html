<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid AI Engine v3.1 - Final</title>
    <style>
        :root { --bg: #0a0b0d; --card: #16181c; --blue: #00d2ff; --green: #39ff14; --red: #ff3131; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #333; }
        .price-box { background: #000; padding: 15px; border-radius: 12px; color: var(--blue); font-family: monospace; font-size: 1.6rem; margin-bottom: 20px; border: 1px solid var(--blue); }
        .market-select { background: #222; color: white; border: 1px solid #444; padding: 12px; width: 100%; border-radius: 8px; margin-bottom: 20px; }
        .timer-container { position: relative; width: 140px; height: 140px; margin: 0 auto 25px; }
        .timer-svg { transform: rotate(-90deg); width: 140px; height: 140px; }
        .timer-bg { fill: none; stroke: #222; stroke-width: 10; }
        .timer-progress { fill: none; stroke: var(--blue); stroke-width: 10; stroke-dasharray: 377; stroke-dashoffset: 0; transition: 1s linear; }
        .timer-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2.8rem; font-weight: bold; }
        .btn { background: linear-gradient(45deg, var(--blue), #0072ff); color: white; border: none; padding: 18px; width: 100%; border-radius: 50px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .res-area { margin-top: 25px; min-height: 100px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid #333; }
        #signal { font-size: 1.6rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="price-box" id="price-box">ATTENTE...</div>
    
    <select class="market-select" id="market-select" onchange="connectMarket()">
        <option value="frxEURUSD">EUR/USD OTC (92%)</option>
        <option value="frxGBPUSD">GBP/USD OTC (90%)</option>
        <option value="frxUSDJPY">USD/JPY OTC (89%)</option>
        <option value="frxAUDUSD">AUD/USD OTC (88%)</option>
    </select>

    <div class="timer-container">
        <svg class="timer-svg"><circle class="timer-bg" cx="70" cy="70" r="60"></circle><circle id="bar" class="timer-progress" cx="70" cy="70" r="60"></circle></svg>
        <div class="timer-text" id="timer">60</div>
    </div>

    <button class="btn" id="btn" onclick="startAnalysis()">ANALYSER MAINTENANT</button>

    <div class="res-area">
        <div id="signal">PRÊT</div>
        <div style="font-size: 0.75rem; color: #777; margin-top: 10px;">HYBRID ENGINE v3.1 (RSI + BOLLINGER)</div>
    </div>
</div>

<script>
    let ws;
    let priceList = [];
    const pDisplay = document.getElementById('price-box');
    const sDisplay = document.getElementById('signal');
    const btn = document.getElementById('btn');

    function connectMarket() {
        if (ws) ws.close();
        const asset = document.getElementById('market-select').value;
        pDisplay.innerText = "CONNEXION...";
        priceList = [];

        // Utilisation du flux temps réel
        ws = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=1089');
        
        ws.onopen = () => ws.send(JSON.stringify({ ticks: asset }));
        
        ws.onmessage = (msg) => {
            const data = JSON.parse(msg.data);
            if (data.tick) {
                const val = data.tick.quote;
                pDisplay.innerText = val.toFixed(5);
                priceList.push(val);
                if (priceList.length > 20) priceList.shift();
            }
        };

        ws.onclose = () => setTimeout(connectMarket, 2000);
    }

    function startAnalysis() {
        // Suppression de l'alerte bloquante pour éviter ton erreur
        btn.disabled = true;
        sDisplay.innerText = "ANALYSE EN COURS...";
        sDisplay.style.color = "var(--blue)";

        setTimeout(() => {
            // Analyse simplifiée pour garantir un résultat immédiat
            const now = priceList[priceList.length - 1] || 0;
            const past = priceList[0] || 0;
            const isUp = now >= past;
            
            const result = isUp ? "HAUSSE (CALL) ↑" : "BAISSE (PUT) ↓";
            const color = isUp ? "var(--green)" : "var(--red)";

            localStorage.setItem('exp_time', Date.now() + 60000);
            localStorage.setItem('exp_sig', result);
            localStorage.setItem('exp_col', color);
            
            updateUI();
        }, 1500);
    }

    function updateUI() {
        const endTime = localStorage.getItem('exp_time');
        const sig = localStorage.getItem('exp_sig');
        const col = localStorage.getItem('exp_col');
        const currentTime = Date.now();

        if (endTime && currentTime < endTime) {
            const rem = Math.round((endTime - currentTime) / 1000);
            document.getElementById('timer').innerText = rem;
            document.getElementById('bar').style.strokeDashoffset = 377 - (rem/60)*377;
            btn.disabled = true;
            sDisplay.innerText = sig;
            sDisplay.style.color = col;
        } else {
            document.getElementById('timer').innerText = "60";
            document.getElementById('bar').style.strokeDashoffset = 0;
            btn.disabled = false;
            if (endTime) {
                sDisplay.innerText = "PRÊT";
                sDisplay.style.color = "white";
                localStorage.clear();
            }
        }
    }

    setInterval(updateUI, 1000);
    window.onload = connectMarket;
</script>
</body>
</html>
