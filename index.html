<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Trading OTC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Bot Trading OTC</h1>
            <p>Signaux en temps réel sur OKX • Timeframe 1 minute</p>
        </header>

        <button id="startBtn" class="btn-start">▶️ Démarrer les Signaux</button>
        <button id="stopBtn" class="btn-stop" style="display:none;">⏹️ Arrêter</button>

        <div id="status" class="status">Statut : Prêt</div>

        <div id="signalsContainer" class="signals-grid"></div>

        <div class="log">
            <h3>Journal des Signaux</h3>
            <div id="logContainer"></div>
        </div>
    </div>

    <script type="module">
        import { startBot } from './engine.js';

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const status = document.getElementById('status');
        const signalsContainer = document.getElementById('signalsContainer');
        const logContainer = document.getElementById('logContainer');

        window.updateUI = function(symbol, signal) {
            let card = document.getElementById('card-' + symbol.replace(/[^a-zA-Z0-9]/g,''));
            if (!card) {
                card = document.createElement('div');
                card.className = `signal-card ${signal.signal.toLowerCase()}`;
                card.id = 'card-' + symbol.replace(/[^a-zA-Z0-9]/g,'');
                signalsContainer.appendChild(card);
            }
            card.innerHTML = `
                <div class="symbol">${symbol}</div>
                <div class="signal ${signal.signal.toLowerCase()}">${signal.signal}</div>
                <div class="price">$${signal.price.toFixed(2)}</div>
                <div class="strength">Force: ${signal.strength}%</div>
                <div>${signal.reason}</div>
            `;

            const logEntry = document.createElement('div');
            logEntry.innerHTML = `[${new Date().toLocaleTimeString()}] ${symbol} → ${signal.signal} (${signal.strength}%) - ${signal.reason}`;
            logContainer.appendChild(logEntry);
            if (logContainer.children.length > 50) logContainer.removeChild(logContainer.children[0]);
        };

        startBtn.addEventListener('click', () => {
            startBot();
            startBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            status.innerHTML = 'Statut : <span style="color:#4ade80">Connexion OKX en cours • Signaux 1 min...</span>';
        });

        stopBtn.addEventListener('click', () => location.reload());
    </script>
</body>
</html>
