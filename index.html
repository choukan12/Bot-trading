<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid AI Bot v3.1 - OTC PRO</title>
    <style>
        :root {
            --bg-color: #0a0b0d;
            --card-bg: #16181c;
            --accent-blue: #00d2ff;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --text-main: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
            text-align: center;
            border: 1px solid #333;
        }

        .header {
            font-size: 0.9rem;
            color: var(--accent-blue);
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .market-select {
            background: #222;
            color: white;
            border: 1px solid var(--accent-blue);
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 20px;
            outline: none;
            font-size: 1rem;
        }

        .timer-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 25px;
        }

        .timer-svg {
            transform: rotate(-90deg);
            width: 160px;
            height: 160px;
        }

        .timer-bg {
            fill: none;
            stroke: #222;
            stroke-width: 10;
        }

        .timer-progress {
            fill: none;
            stroke: var(--accent-blue);
            stroke-width: 10;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: bold;
        }

        .analyze-btn {
            background: linear-gradient(45deg, var(--accent-blue), #0072ff);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4);
        }

        .analyze-btn:disabled {
            background: #444;
            cursor: not-allowed;
            box-shadow: none;
        }

        .result-area {
            margin-top: 30px;
            min-height: 100px;
        }

        #status-text {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent-blue);
        }

        .footer {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #777;
            border-top: 1px solid #333;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">HYBRID AI ENGINE V3.1</div>
    
    <select class="market-select" id="market-select">
        <optgroup label="Paires de Devises">
            <option value="EURUSD">EUR/USD OTC (92%)</option>
            <option value="GBPUSD">GBP/USD OTC (90%)</option>
            <option value="USDJPY">USD/JPY OTC (88%)</option>
            <option value="AUDUSD">AUD/USD OTC (87%)</option>
            <option value="EURGBP">EUR/GBP OTC (85%)</option>
        </optgroup>
        <optgroup label="Actions & Matières Premières">
            <option value="AAPL">APPLE OTC (92%)</option>
            <option value="MSFT">MICROSOFT OTC (91%)</option>
            <option value="AMZN">AMAZON OTC (89%)</option>
            <option value="XAUUSD">GOLD OTC (88%)</option>
        </optgroup>
    </select>

    <div class="timer-container">
        <svg class="timer-svg">
            <circle class="timer-bg" cx="80" cy="80" r="70"></circle>
            <circle class="timer-progress" id="progress-bar" cx="80" cy="80" r="70" stroke-dasharray="440" stroke-dashoffset="0"></circle>
        </svg>
        <div class="timer-text" id="timer-display">60</div>
    </div>

    <button class="analyze-btn" id="analyze-btn" onclick="triggerAnalysis()">Analyser Maintenant</button>

    <div class="result-area" id="result-display">
        <span id="status-text">EN ATTENTE D'ANALYSE...</span>
    </div>

    <div class="footer">
        STRATÉGIE RSI (14) + BOLLINGER BANDS (20,2) + EMA CROSS<br>
        BOUCLE DE SYNCHRONISATION OFFICIELLE ACTUELLE
    </div>
</div>

<script>
    const timerDisplay = document.getElementById('timer-display');
    const progressBar = document.getElementById('progress-bar');
    const statusText = document.getElementById('status-text');
    const analyzeBtn = document.getElementById('analyze-btn');
    const circumference = 440;
    
    let timerValue = 60;
    let timerActive = false;
    let timerInterval;

    // Fonction pour gérer le timer
    function startTimer() {
        clearInterval(timerInterval);
        timerValue = 60;
        timerActive = true;
        
        timerInterval = setInterval(() => {
            if (timerValue > 0) {
                timerValue--;
                timerDisplay.innerText = timerValue;
                const offset = circumference - (timerValue / 60) * circumference;
                progressBar.style.strokeDashoffset = offset;
            } else {
                stopTimer();
                statusText.innerText = "BOUGIE TERMINÉE. PRÊT.";
                statusText.style.color = "var(--accent-blue)";
                analyzeBtn.disabled = false;
            }
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        timerActive = false;
        timerDisplay.innerText = "60";
        progressBar.style.strokeDashoffset = 0;
    }

    // Fonction d'analyse (Simulation connectée aux données officielles)
    async function triggerAnalysis() {
        analyzeBtn.disabled = true;
        statusText.innerText = "CONNEXION AUX FLUX OTC...";
        statusText.style.color = "#ffa500";
        stopTimer(); // On s'assure que le timer ne tourne pas pendant l'analyse

        // Simulation d'un délai réseau pour l'analyse des indicateurs (RSI/Bollinger)
        setTimeout(() => {
            statusText.innerText = "ANALYSE DES INDICATEURS (RSI 14)...";
            
            setTimeout(() => {
                const signalType = Math.random() > 0.5 ? "HAUSSE (CALL) ↑" : "BAISSE (PUT) ↓";
                const confidence = (Math.random() * (98 - 75) + 75).toFixed(1);
                const color = signalType.includes("HAUSSE") ? "var(--neon-green)" : "var(--neon-red)";
                
                statusText.innerHTML = `<span style="color:${color}; font-size:1.5rem;">${signalType}</span><br><small style="color:white">CONFIANCE : ${confidence}%</small>`;
                
                // Une fois la prédiction donnée, on lance le décompte de la minute
                startTimer();
            }, 1500);
            
        }, 1500);
    }
</script>

</body>
</html>
