<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO SIGNAL BOT - OTC MULTI</title>
    <style>
        body { background: #050a12; color: #e0e0e0; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { max-width: 400px; width: 100%; background: #0d1421; padding: 25px; border-radius: 15px; border: 1px solid #1a263a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .status-bar { background: rgba(241, 156, 18, 0.1); color: #f1c40f; padding: 10px; font-size: 0.8em; border-radius: 5px; margin-bottom: 15px; border: 1px solid #f1c40f; }
        select { width: 100%; background: #162031; color: white; border: 1px solid #2a3a52; padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        #analyze-btn { width: 100%; padding: 18px; background: linear-gradient(90deg, #00c6ff, #0072ff); border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 1em; }
        #result-area { margin-top: 20px; background: #162031; padding: 20px; border-radius: 10px; border: 1px dashed #2a3a52; }
        .hidden { display: none; }
        .price-live { color: #4facfe; font-family: monospace; font-size: 1.2em; margin: 15px 0; }
        #confidence-level { height: 8px; background: #2ecc71; border-radius: 4px; transition: 1s; width: 0%; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color:#4facfe;">⚡ SIGNAL BOT PRO</h2>
        <div class="status-bar" id="timer-display">ATTENTE FLUX OFFICIEL...</div>

        <label style="display:block; text-align:left; font-size:0.7em; color:#5c6b84;">SÉLECTIONNER LE MARCHÉ OTC</label>
        <select id="market-select">
            <optgroup label="DEVISES OTC">
                <option value="EURUSD">EUR/USD OTC</option>
                <option value="GBPUSD">GBP/USD OTC</option>
                <option value="USDJPY">USD/JPY OTC</option>
                <option value="AUDUSD">AUD/USD OTC</option>
                <option value="USDCAD">USD/CAD OTC</option>
            </optgroup>
            <optgroup label="ACTIONS OTC">
                <option value="APPLE">APPLE OTC</option>
                <option value="AMAZON">AMAZON OTC</option>
                <option value="FACEBOOK">META OTC</option>
                <option value="GOOGLE">GOOGLE OTC</option>
                <option value="TESLA">TESLA OTC</option>
            </optgroup>
            <optgroup label="INDICES">
                <option value="CRYPTO_IDX">CRYPTO IDX</option>
                <option value="R_100">VOLATILITY 100</option>
                <option value="R_50">VOLATILITY 50</option>
            </optgroup>
        </select>

        <div class="price-live">LIVE: <span id="live-price">--.-----</span></div>
        
        <button id="analyze-btn">▶ ANALYSER MAINTENANT</button>

        <div id="result-area" class="hidden">
            <h1 id="signal-type" style="margin:5px 0;">--</h1>
            <div style="background:#050a12; border-radius:4px;"><div id="confidence-level"></div></div>
            <p>CONFIANCE: <span id="conf-val">0%</span></p>
        </div>
    </div>
    <script src="engine.js"></script>
</body>
</html>
