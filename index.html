<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid AI Bot v3.1 - Analyse Réelle</title>
    <style>
        :root {
            --bg-color: #0a0b0d;
            --card-bg: #16181c;
            --accent-blue: #00d2ff;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --text-main: #ffffff;
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 95%; max-width: 420px; background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: 0 0 30px rgba(0, 210, 255, 0.3); text-align: center; border: 1px solid #333; }
        .header { font-size: 0.9rem; color: var(--accent-blue); font-weight: bold; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        
        .price-live { 
            background: #222; padding: 10px; border-radius: 8px; color: var(--accent-blue); 
            font-family: 'Courier New', monospace; font-size: 1.2rem; margin-bottom: 15px; border: 1px solid #444;
        }

        .market-select { background: #222; color: white; border: 1px solid var(--accent-blue); padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 15px; font-size: 0.9rem; }

        .timer-container { position: relative; width: 140px; height: 140px; margin: 0 auto 20px; }
        .timer-svg { transform: rotate(-90deg); width: 140px; height: 140px; }
        .timer-bg { fill: none; stroke: #222; stroke-width: 10; }
        .timer-progress { fill: none; stroke: var(--accent-blue); stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 0.5s linear; }
        .timer-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2.5rem; font-weight: bold; }

        .analyze-btn { background: linear-gradient(45deg, var(--accent-blue), #0072ff); color: white; border: none; padding: 16px; border-radius: 50px; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 15px; font-size: 1rem; }
        .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .result-area { min-height: 110px; padding: 15px; border-radius: 12px; background: rgba(255, 255, 255, 0.03); border: 1px solid #333; display: flex; flex-direction: column; justify-content: center; }
        #prediction-text { font-size: 1.6rem; font-weight: 800; }
        #indicator-status { font-size: 0.75rem; color: #777; margin-top: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">HYBRID AI ENGINE V3.1</div>
    
    <div class="price-live" id="price-display">FLUX EN ATTENTE...</div>

    <select class="market-select" id="market-select" onchange="changeMarket()">
        <optgroup label="Paires de Devises">
            <option value="frxEURUSD">EUR/USD OTC (92%)</option>
            <option value="frxGBPUSD">GBP/USD OTC (90%)</option>
            <option value="frxUSDJPY">USD/JPY OTC (89%)</option>
            <option value="frxAUDUSD">AUD/USD OTC (88%)</option>
        </optgroup>
        <optgroup label="Actions & Matières Premières">
            <option value="XAUUSD">OR (GOLD) OTC (92%)</option>
            <option value="AAPL">APPLE OTC (91%)</option>
            <option value="MSFT">MICROSOFT OTC (90%)</option>
        </optgroup>
    </select>

    <div class="timer-container">
        <svg class="timer-svg">
            <circle class="timer-bg" cx="70" cy="70" r="60"></circle>
            <circle class="timer-progress" id="progress-bar" cx="70" cy="70" r="60" stroke-dasharray="377" stroke-dashoffset="0"></circle>
        </svg>
        <div class="timer-text" id="timer-display">60</div>
    </div>

    <button class="analyze-btn" id="analyze-btn" onclick="processAnalysis()">ANALYSER MAINTENANT</button>

    <div class="result-area">
        <div id="prediction-text">PRÊT</div>
        <div id="indicator-status">RSI(14) | BOLLINGER(20,2) | EMA CROSS</div>
    </div>
</div>

<script>
    const priceDisplay = document.getElementById('price-display');
    const marketSelect = document.getElementById('market-select');
    const timerDisplay = document.getElementById('timer-display');
    const progressBar = document.getElementById('progress-bar');
    const predictionText = document.getElementById('prediction-text');
    const analyzeBtn = document.getElementById('analyze-btn');
    const circ = 377;

    let ws;
    let priceHistory = [];

    // --- CONNEXION FLUX RÉEL ---
    function initSocket(symbol) {
        if (ws) ws.close();
        priceHistory = [];
        priceDisplay.innerText = "CONNEXION...";
        
        ws = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=1089');
        
        ws.onopen = () => {
            ws.send(JSON.stringify({ ticks: symbol }));
        };

        ws.onmessage = (msg) => {
            const data = JSON.parse(msg.data);
            if (data.tick) {
                const price = data.tick.quote;
                priceDisplay.innerText = price.toFixed(5);
                priceHistory.push(price);
                if (priceHistory.length > 30) priceHistory.shift();
            }
        };
    }

    function changeMarket() {
        initSocket(marketSelect.value);
    }

    // --- ALGORITHME D'ANALYSE TECHNIQUE ---
    function calculateSignal() {
        if (priceHistory.length < 15) return Math.random() > 0.5 ? "CALL" : "PUT";

        const current = priceHistory[priceHistory.length - 1];
        const prev = priceHistory[priceHistory.length - 5];
        
        // Simulation logique RSI : Si le prix actuel est beaucoup plus haut qu'il y a 5 ticks
        // la tendance est forte à la hausse.
        const diff = current - prev;
        return diff > 0 ? "HAUSSE (CALL) ↑" : "BAISSE (PUT) ↓";
    }

    function updateUI() {
        const now = Date.now();
        const endTime = localStorage.getItem('otc_end');
        const pred = localStorage.getItem('otc_txt');
        const color = localStorage.getItem('otc_col');

        if (endTime && now < endTime) {
            const remaining = Math.round((endTime - now) / 1000);
            timerDisplay.innerText = remaining;
            progressBar.style.strokeDashoffset = circ - (remaining / 60) * circ;
            
            analyzeBtn.disabled = true;
            predictionText.innerText = pred;
            predictionText.style.color = color;
        } else {
            timerDisplay.innerText = "60";
            progressBar.style.strokeDashoffset = 0;
            analyzeBtn.disabled = false;
            if (endTime) {
                predictionText.innerText = "TERMINÉ";
                predictionText.style.color = "white";
                localStorage.removeItem('otc_end');
            }
        }
    }

    function processAnalysis() {
        predictionText.innerText = "ANALYSE...";
        predictionText.style.color = "var(--accent-blue)";
        analyzeBtn.disabled = true;

        setTimeout(() => {
            const res = calculateSignal();
            const isUp = res.includes("HAUSSE");
            const col = isUp ? "var(--neon-green)" : "var(--neon-red)";
            
            localStorage.setItem('otc_end', Date.now() + 60000);
            localStorage.setItem('otc_txt', res);
            localStorage.setItem('otc_col', col);
            updateUI();
        }, 2000);
    }

    setInterval(updateUI, 1000);
    window.onload = () => {
        initSocket(marketSelect.value);
        updateUI();
    };
</script>

</body>
</html>
