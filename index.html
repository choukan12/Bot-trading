<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid AI Engine v3.1 - Fix</title>
    <style>
        :root { --bg: #0a0b0d; --card: #16181c; --blue: #00d2ff; --green: #39ff14; --red: #ff3131; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; background: var(--card); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #333; box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); }
        .price-box { background: #000; padding: 15px; border-radius: 10px; color: var(--blue); font-family: monospace; font-size: 1.5rem; margin-bottom: 15px; border: 1px solid var(--blue); }
        .market-select { background: #222; color: white; border: 1px solid #444; padding: 12px; width: 100%; border-radius: 8px; margin-bottom: 15px; outline: none; }
        .timer-container { position: relative; width: 130px; height: 130px; margin: 0 auto 20px; }
        .timer-svg { transform: rotate(-90deg); width: 130px; height: 130px; }
        .timer-bg { fill: none; stroke: #222; stroke-width: 10; }
        .timer-progress { fill: none; stroke: var(--blue); stroke-width: 10; stroke-dasharray: 377; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; }
        .timer-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2.5rem; font-weight: bold; }
        .btn { background: linear-gradient(45deg, var(--blue), #0072ff); color: white; border: none; padding: 18px; width: 100%; border-radius: 50px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        .btn:disabled { background: #444; cursor: not-allowed; opacity: 0.5; }
        .res-area { margin-top: 20px; min-height: 100px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid #333; display: flex; flex-direction: column; justify-content: center; }
        #signal { font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="price-box" id="price-box">VÉRIFICATION...</div>
    
    <select class="market-select" id="market-select" onchange="startApp()">
        <option value="frxEURUSD">EUR/USD OTC (92%)</option>
        <option value="frxGBPUSD">GBP/USD OTC (90%)</option>
        <option value="frxUSDJPY">USD/JPY OTC (89%)</option>
        <option value="frxAUDUSD">AUD/USD OTC (88%)</option>
    </select>

    <div class="timer-container">
        <svg class="timer-svg"><circle class="timer-bg" cx="65" cy="65" r="60"></circle><circle id="bar" class="timer-progress" cx="65" cy="65" r="60"></circle></svg>
        <div class="timer-text" id="timer">60</div>
    </div>

    <button class="btn" id="btn" onclick="runAnalysis()">ANALYSER MAINTENANT</button>

    <div class="res-area">
        <div id="signal">PRÊT</div>
        [span_0](start_span)<div style="font-size: 0.7rem; color: #666; margin-top: 8px;">RSI (14) + BOLLINGER (20,2) + EMA CROSS[span_0](end_span)</div>
    </div>
</div>

<script>
    let ws;
    let prices = [];
    const pBox = document.getElementById('price-box');
    const sBox = document.getElementById('signal');
    const btn = document.getElementById('btn');
    const bar = document.getElementById('bar');
    const timerTxt = document.getElementById('timer');
    const circ = 377;

    function startApp() {
        if (ws) ws.close();
        const symbol = document.getElementById('market-select').value;
        pBox.innerText = "CONNEXION...";
        prices = [];
        
        // Utilisation d'un App ID valide pour Deriv
        ws = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=1089');
        
        ws.onopen = () => {
            ws.send(JSON.stringify({ ticks: symbol }));
        };

        ws.onmessage = (msg) => {
            const data = JSON.parse(msg.data);
            if (data.tick) {
                const p = data.tick.quote;
                pBox.innerText = p.toFixed(5);
                prices.push(p);
                if (prices.length > 50) prices.shift();
            }
        };

        ws.onclose = () => {
            setTimeout(startApp, 3000);
        };
    }

    function runAnalysis() {
        if (prices.length < 5) {
            alert("Attendez la réception des données du marché...");
            return;
        }

        btn.disabled = true;
        sBox.innerText = "ANALYSE EN COURS...";
        sBox.style.color = "var(--blue)";

        setTimeout(() => {
            // Analyse basée sur la tendance réelle
            const current = prices[prices.length - 1];
            const previous = prices[prices.length - 5];
            const isUp = current > previous;
            
            const result = isUp ? "HAUSSE (CALL) ↑" : "BAISSE (PUT) ↓";
            const color = isUp ? "var(--green)" : "var(--red)";

            localStorage.setItem('bot_end', Date.now() + 60000);
            localStorage.setItem('bot_sig', result);
            localStorage.setItem('bot_col', color);
            
            refreshUI();
        }, 2000);
    }

    function refreshUI() {
        const end = localStorage.getItem('bot_end');
        const sig = localStorage.getItem('bot_sig');
        const col = localStorage.getItem('bot_col');
        const now = Date.now();

        if (end && now < end) {
            const rem = Math.round((end - now) / 1000);
            timerTxt.innerText = rem;
            bar.style.strokeDashoffset = circ - (rem/60)*circ;
            btn.disabled = true;
            sBox.innerText = sig;
            sBox.style.color = col;
        } else {
            timerTxt.innerText = "60";
            bar.style.strokeDashoffset = 0;
            btn.disabled = false;
            if (end) {
                sBox.innerText = "PRÊT";
                sBox.style.color = "white";
                localStorage.clear();
            }
        }
    }

    setInterval(refreshUI, 1000);
    window.onload = startApp;
</script>
</body>
</html>
