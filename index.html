<head>
    <meta charset="UTF-8">

    <style>
        :root { --bg: #0a0b0d; --card: #16181c; --blue: #00d2ff; --green: #39ff14; --red: #ff3131; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 420px; background: var(--card); padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #333; box-shadow: 0 0 25px rgba(0, 210, 255, 0.25); }
        .price-box { background: #000; padding: 15px; border-radius: 10px; color: var(--blue); font-family: monospace; font-size: 1.6rem; margin-bottom: 15px; border: 1px solid var(--blue); }
        .market-select, .token-input, .stake-input { background: #222; color: white; border: 1px solid #444; padding: 12px; width: 100%; border-radius: 8px; margin-bottom: 12px; outline: none; }
        .timer-container { position: relative; width: 130px; height: 130px; margin: 15px auto; }
        .timer-svg { transform: rotate(-90deg); width: 130px; height: 130px; }
        .timer-bg { fill: none; stroke: #222; stroke-width: 10; }
        .timer-progress { fill: none; stroke: var(--blue); stroke-width: 10; stroke-dasharray: 377; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; }
        .timer-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2.6rem; font-weight: bold; }
        .btn { background: linear-gradient(45deg, var(--blue), #0072ff); color: white; border: none; padding: 16px; width: 100%; border-radius: 50px; font-weight: bold; font-size: 1.05rem; cursor: pointer; margin: 8px 0; transition: 0.3s; }
        .btn:disabled { background: #444; cursor: not-allowed; opacity: 0.6; }
        .btn-green { background: linear-gradient(45deg, var(--green), #00c000); }
        .btn-red { background: linear-gradient(45deg, var(--red), #c00); }
        .res-area { margin-top: 20px; min-height: 140px; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid #333; text-align: left; }
        #signal { font-size: 1.45rem; font-weight: bold; margin-bottom: 8px; }
        .log { font-size: 0.82rem; color: #aaa; max-height: 160px; overflow-y: auto; }
    </style>

    function log(msg) {
        const time = new Date().toLocaleTimeString('fr-FR');
        logBox.innerHTML += `<div>[${time}] ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
        if (logBox.children.length > 50) logBox.removeChild(logBox.firstChild);
    }

    function calculateRSI(data, period = 14) {
        if (data.length < period + 1) return 50;
        let gains = 0, losses = 0;
        for (let i = data.length - period; i < data.length; i++) {
            const ch = data[i] - data[i - 1];
            if (ch > 0) gains += ch; else losses -= ch;
        }
        const avgGain = gains / period;
        const avgLoss = losses / period || 0.0001;
        const rs = avgGain / avgLoss;
        return Math.max(0, Math.min(100, 100 - 100 / (1 + rs)));
    }

    function calculateEMA(data, period) {
        if (data.length < period) return data[data.length - 1] || 0;
        let ema = data[0];
        const k = 2 / (period + 1);
        for (let i = 1; i < data.length; i++) {
            ema = data[i] * k + ema * (1 - k);
        }
        return ema;
    }

    function getSignal() {
        if (prices.length < 20) return { signal: "EN ATTENTE", color: "#888", details: "Collecte de ticks..." };

        const rsi = calculateRSI(prices);
        const slice = prices.slice(-20);
        const middle = slice.reduce((a, b) => a + b, 0) / 20;
        const std = Math.sqrt(slice.reduce((a, b) => a + Math.pow(b - middle, 2), 0) / 20);
        const bbUpper = middle + 2 * std;
        const bbLower = middle - 2 * std;

        const ema9 = calculateEMA(prices, 9);
        const ema21 = calculateEMA(prices, 21);
        const current = prices[prices.length - 1];

        let signal = "NEUTRAL", color = "white";
        if (current < bbLower && rsi < 40 && ema9 > ema21) {
            signal = "HAUSSE (CALL) ↑"; color = "var(--green)";
        } else if (current > bbUpper && rsi > 60 && ema9 < ema21) {
            signal = "BAISSE (PUT) ↓"; color = "var(--red)";
        }

        const details = `RSI: ${rsi.toFixed(1)} | EMA 9/21: ${ema9.toFixed(5)}/${ema21.toFixed(5)} | BB: ${bbLower.toFixed(5)} - ${bbUpper.toFixed(5)}`;
        return { signal, color, details };
    }
