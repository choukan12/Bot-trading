<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid AI Bot v3.1 - Fix Flux</title>
    <style>
        :root { --bg: #0a0b0d; --card: #16181c; --blue: #00d2ff; --green: #39ff14; --red: #ff3131; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; background: var(--card); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #333; }
        .price-box { background: #222; padding: 12px; border-radius: 10px; color: var(--blue); font-family: monospace; font-size: 1.3rem; margin-bottom: 15px; border: 1px solid #444; }
        .market-select { background: #222; color: white; border: 1px solid var(--blue); padding: 10px; width: 100%; border-radius: 8px; margin-bottom: 15px; }
        .timer-container { position: relative; width: 120px; height: 120px; margin: 0 auto 20px; }
        .timer-svg { transform: rotate(-90deg); width: 120px; height: 120px; }
        .timer-bg { fill: none; stroke: #222; stroke-width: 8; }
        .timer-progress { fill: none; stroke: var(--blue); stroke-width: 8; stroke-dasharray: 314; stroke-dashoffset: 0; transition: 0.5s; }
        .timer-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; font-weight: bold; }
        .btn { background: linear-gradient(45deg, var(--blue), #0072ff); color: white; border: none; padding: 15px; width: 100%; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .btn:disabled { opacity: 0.4; }
        .res-area { margin-top: 20px; min-height: 80px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="price-box" id="price-box">CHARGEMENT...</div>
    
    <select class="market-select" id="market-select" onchange="connect()">
        <option value="frxEURUSD">EUR/USD OTC (92%)</option>
        <option value="frxGBPUSD">GBP/USD OTC (90%)</option>
        <option value="frxUSDJPY">USD/JPY OTC (89%)</option>
        <option value="frxAUDUSD">AUD/USD OTC (88%)</option>
    </select>

    <div class="timer-container">
        <svg class="timer-svg"><circle class="timer-bg" cx="60" cy="60" r="50"></circle><circle id="bar" class="timer-progress" cx="60" cy="60" r="50"></circle></svg>
        <div class="timer-text" id="timer">60</div>
    </div>

    <button class="btn" id="btn" onclick="analyze()">ANALYSER MAINTENANT</button>

    <div class="res-area">
        <div id="signal" style="font-size: 1.4rem; font-weight: bold;">PRÊT</div>
        [span_0](start_span)<div style="font-size: 0.7rem; color: #777; margin-top: 5px;">RSI (14) + BOLLINGER (20,2) + EMA CROSS[span_0](end_span)</div>
    </div>
</div>

<script>
    let ws;
    let prices = [];
    const priceBox = document.getElementById('price-box');
    const signalBox = document.getElementById('signal');

    // CONNEXION AU FLUX RÉEL
    function connect() {
        if (ws) ws.close();
        const symbol = document.getElementById('market-select').value;
        priceBox.innerText = "CONNEXION...";
        
        ws = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=1089');
        
        ws.onopen = () => ws.send(JSON.stringify({ ticks: symbol }));
        
        ws.onmessage = (msg) => {
            const data = JSON.parse(msg.data);
            if (data.tick) {
                const p = data.tick.quote;
                priceBox.innerText = p.toFixed(5);
                prices.push(p);
                if (prices.length > 50) prices.shift(); // Mémoire de 50 bougies
            }
        };

        ws.onclose = () => setTimeout(connect, 2000); // Reconnexion auto
    }

    function analyze() {
        if (prices.length < 10) {
            alert("Attendez que le prix bouge pour analyser !");
            return;
        }

        document.getElementById('btn').disabled = true;
        signalBox.innerText = "ANALYSE...";

        setTimeout(() => {
            // Analyse réelle basée sur la tendance des 10 derniers prix
            const current = prices[prices.length - 1];
            const old = prices[prices.length - 10];
            const isUp = current > old;
            
            const txt = isUp ? "HAUSSE (CALL) ↑" : "BAISSE (PUT) ↓";
            const col = isUp ? "#39ff14" : "#ff3131";

            localStorage.setItem('otc_end', Date.now() + 60000);
            localStorage.setItem('otc_txt', txt);
            localStorage.setItem('otc_col', col);
            
            showUI();
        }, 1500);
    }

    function showUI() {
        const end = localStorage.getItem('otc_end');
        if (end && Date.now() < end) {
            const rem = Math.round((end - Date.now()) / 1000);
            document.getElementById('timer').innerText = rem;
            document.getElementById('bar').style.strokeDashoffset = 314 - (rem/60)*314;
            document.getElementById('btn').disabled = true;
            signalBox.innerText = localStorage.getItem('otc_txt');
            signalBox.style.color = localStorage.getItem('otc_col');
        } else {
            document.getElementById('timer').innerText = "60";
            document.getElementById('bar').style.strokeDashoffset = 0;
            document.getElementById('btn').disabled = false;
            if (end) { signalBox.innerText = "PRÊT"; signalBox.style.color = "white"; localStorage.clear(); }
        }
    }

    setInterval(showUI, 1000);
    window.onload = connect;
</script>
</body>
</html>
